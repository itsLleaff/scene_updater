save_scene:
  name: Save Scene
  description: Overwrites an existing scene in a YAML file with the current states of its entities.
  fields:
    scene_entity:
      name: Scene
      description: Select the scene you want to update from the dropdown list.
      required: true
      example: scene.living_room_relax
      selector:
        entity:
          domain: scene
    file_path:
      name: File Path
      description: The path to the scenes YAML file, relative to the config directory. Defaults to scenes.yaml.
      required: false
      default: scenes.yaml
      example: custom_scenes/living_room.yaml
      selector:
        text:
